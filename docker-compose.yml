services:
  postgres:
    image: postgres:16-alpine
    container_name: txn_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-txnuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-txnpass}
      POSTGRES_DB: ${POSTGRES_DB:-txndb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-txnuser} -d ${POSTGRES_DB:-txndb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: txn_redis
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: txn_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-txnuser}:${POSTGRES_PASSWORD:-txnpass}@postgres:5432/${POSTGRES_DB:-txndb}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-change-me}
    ports:
      - "${API_PORT:-8001}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: txn_worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-txnuser}:${POSTGRES_PASSWORD:-txnpass}@postgres:5432/${POSTGRES_DB:-txndb}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-change-me}
      IMAP_HOST: ${IMAP_HOST:-host.docker.internal}
      IMAP_PORT: ${IMAP_PORT:-1143}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
    volumes:
      - ./worker:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: txn_frontend
    ports:
      - "${FRONTEND_PORT:-5174}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8001}
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
