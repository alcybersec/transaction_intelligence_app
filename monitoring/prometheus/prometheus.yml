# Prometheus configuration for Transaction Intelligence App
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # API service metrics
  - job_name: 'txn-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PostgreSQL metrics (requires postgres_exporter - optional)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis metrics (requires redis_exporter - optional)
  # - job_name: 'redis'
