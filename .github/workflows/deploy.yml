# Build container images, push to GHCR, and deploy to self-hosted server.
# Triggered on pushes to main and version tags.

name: Build & Deploy

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'backend/**'
      - 'worker/**'
      - 'frontend/**'
      - 'docker-compose*.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/txn-api
  WORKER_IMAGE: ghcr.io/${{ github.repository_owner }}/txn-worker
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/txn-frontend

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    name: Build API Image
    runs-on: [self-hosted, homelab]
    steps:
      - name: Fix workspace permissions
        run: docker run --rm -v "${{ github.workspace }}:/__w" alpine chown -R $(id -u):$(id -g) /__w || true

      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-worker:
    name: Build Worker Image
    runs-on: [self-hosted, homelab]
    steps:
      - name: Fix workspace permissions
        run: docker run --rm -v "${{ github.workspace }}:/__w" alpine chown -R $(id -u):$(id -g) /__w || true

      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WORKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    name: Build Frontend Image
    runs-on: [self-hosted, homelab]
    steps:
      - name: Fix workspace permissions
        run: docker run --rm -v "${{ github.workspace }}:/__w" alpine chown -R $(id -u):$(id -g) /__w || true

      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Self-Hosted Server
    needs: [build-api, build-worker, build-frontend]
    runs-on: [self-hosted, homelab]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Fix workspace permissions
        run: docker run --rm -v "${{ github.workspace }}:/__w" alpine chown -R $(id -u):$(id -g) /__w || true

      - uses: actions/checkout@v4

      - name: Disable old git hooks on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          script: |
            DEPLOY_DIR="${{ vars.DEPLOY_DIR || '~/txn-app' }}"
            mkdir -p "${DEPLOY_DIR}"
            # Remove any git hooks that trigger old-style deploys
            if [ -d "${DEPLOY_DIR}/.git/hooks" ]; then
              find "${DEPLOY_DIR}/.git/hooks" -type f ! -name '*.sample' -exec rm -f {} +
            fi

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          source: "docker-compose.yml,docker-compose.selfhosted.yml"
          target: ${{ vars.DEPLOY_DIR || '~/txn-app' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_DIR || '~/txn-app' }}

            export GHCR_OWNER="${{ github.repository_owner }}"
            export IMAGE_TAG="$(echo '${{ github.sha }}' | cut -c1-7)"
            export API_IMAGE="ghcr.io/${GHCR_OWNER}/txn-api:${IMAGE_TAG}"
            export WORKER_IMAGE="ghcr.io/${GHCR_OWNER}/txn-worker:${IMAGE_TAG}"
            export FRONTEND_IMAGE="ghcr.io/${GHCR_OWNER}/txn-frontend:${IMAGE_TAG}"

            # Public repo — GHCR images are publicly readable, no login needed

            # Pull latest images
            docker pull "${API_IMAGE}"
            docker pull "${WORKER_IMAGE}"
            docker pull "${FRONTEND_IMAGE}"

            # Tag as latest so compose uses them
            docker tag "${API_IMAGE}" "ghcr.io/${GHCR_OWNER}/txn-api:latest"
            docker tag "${WORKER_IMAGE}" "ghcr.io/${GHCR_OWNER}/txn-worker:latest"
            docker tag "${FRONTEND_IMAGE}" "ghcr.io/${GHCR_OWNER}/txn-frontend:latest"

            # Restart services
            docker compose -f docker-compose.yml \
              -f docker-compose.selfhosted.yml \
              up -d --no-build --remove-orphans

            # Run any pending migrations
            docker compose -f docker-compose.yml \
              -f docker-compose.selfhosted.yml \
              exec -T api alembic upgrade head

            # Verify health
            sleep 5
            docker compose -f docker-compose.yml \
              -f docker-compose.selfhosted.yml \
              exec -T api python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
            echo "Deployment successful"
