name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Apps-VM
    runs-on: [self-hosted, homelab]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy via SSH
        run: |
          ssh -i /home/runner/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            alex@192.168.1.152
