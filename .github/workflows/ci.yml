name: CI

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Run ruff check and format
        run: |
          docker build -t txn-backend-lint -f - ./backend <<'DOCKERFILE'
          FROM python:3.12-slim
          WORKDIR /app
          RUN pip install --no-cache-dir ruff
          COPY . .
          DOCKERFILE
          docker run --rm txn-backend-lint sh -c "ruff check . && ruff format --check ."

  backend-test:
    name: Backend Tests
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Run pytest
        run: |
          docker build -t txn-backend-test -f - ./backend <<'DOCKERFILE'
          FROM python:3.12-slim
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends build-essential libpq-dev && rm -rf /var/lib/apt/lists/*
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          RUN pip install --no-cache-dir pytest pytest-asyncio
          COPY . .
          DOCKERFILE
          docker run --rm txn-backend-test pytest -v

  worker-lint:
    name: Worker Lint
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Run ruff check and format
        run: |
          docker build -t txn-worker-lint -f - ./worker <<'DOCKERFILE'
          FROM python:3.12-slim
          WORKDIR /app
          RUN pip install --no-cache-dir ruff
          COPY . .
          DOCKERFILE
          docker run --rm txn-worker-lint sh -c "ruff check . && ruff format --check ."

  worker-test:
    name: Worker Tests
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Run pytest
        run: |
          docker build -t txn-worker-test -f - ./worker <<'DOCKERFILE'
          FROM python:3.12-slim
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends build-essential libpq-dev && rm -rf /var/lib/apt/lists/*
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          RUN pip install --no-cache-dir pytest pytest-asyncio
          COPY . .
          DOCKERFILE
          docker run --rm txn-worker-test pytest -v

  frontend-lint:
    name: Frontend Lint
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Run ESLint
        run: |
          docker build -t txn-frontend-lint -f - ./frontend <<'DOCKERFILE'
          FROM node:20-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci || npm install
          COPY . .
          DOCKERFILE
          docker run --rm txn-frontend-lint npx eslint .

  frontend-test:
    name: Frontend Tests
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Run vitest
        run: |
          docker build -t txn-frontend-test -f - ./frontend <<'DOCKERFILE'
          FROM node:20-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci || npm install
          COPY . .
          DOCKERFILE
          docker run --rm txn-frontend-test npm test -- --run

  docker-build:
    name: Docker Build Test
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t txn-api ./backend

      - name: Build Worker image
        run: docker build -t txn-worker ./worker

      - name: Build Frontend image
        run: docker build -t txn-frontend ./frontend
